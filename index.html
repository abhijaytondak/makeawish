<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>SalarySe — Make a Wish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,700;1,9..144,900&family=Playfair+Display:ital,wght@0,500;0,700;0,800;0,900;1,500;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" as="image" href="banner.webp" type="image/webp" fetchpriority="high" />
    <link rel="preload" as="image" href="banner.jpg" type="image/jpeg" />
    <link rel="preload" as="image" href="task_card.webp" type="image/webp" />
    <link rel="preload" as="image" href="task_upscore.webp" type="image/webp" />
    <link rel="preload" as="image" href="task_refer.webp" type="image/webp" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Noto Sans", "system-ui", "sans-serif"],
              serif: ["Fraunces", "Georgia", "serif"],
              display: ["Playfair Display", "Georgia", "serif"],
            },
            colors: {
              brand: {
                DEFAULT: "#7849C9", // royal purple, lighter for dark contrast
                deep: "#5B2EAA",
                darker: "#2C0F5C",
                soft: "rgba(120,73,201,0.16)",
                glow: "#9B6FE3",
              },
              hl: {
                DEFAULT: "#F4CC60",
                deep: "#C9A24E",
                soft: "rgba(244,204,96,0.14)",
                bright: "#FBE38C",
              },
              // Neutral OLED-dark surfaces
              bg: "#121212", // app canvas
              surface: "#1A1A1A", // default card
              elev: "#222222", // elevated card
              line: "#2A2A2A", // borders/dividers
              wash: "#171717", // input wash on dark
              // Text
              ink: { DEFAULT: "#F4F0FB", soft: "#CDC4E6", mute: "#8B7DAC", dim: "#5C4D7C" },
            },
            boxShadow: {
              card: "0 1px 0 rgba(0,0,0,0.4), 0 12px 32px rgba(0,0,0,0.4)",
              cta: "0 12px 32px rgba(120,73,201,0.40), inset 0 1px 0 rgba(255,255,255,0.12)",
              gold: "0 8px 28px rgba(244,204,96,0.40)",
              ring: "0 0 0 1px rgba(244,204,96,0.4), 0 0 24px rgba(244,204,96,0.18)",
            },
            keyframes: {
              shimmer: {
                "0%": { backgroundPosition: "-400px 0" },
                "100%": { backgroundPosition: "400px 0" },
              },
              float: {
                "0%,100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-6px)" },
              },
              pop: {
                "0%": { transform: "scale(0.9)", opacity: 0 },
                "60%": { transform: "scale(1.04)", opacity: 1 },
                "100%": { transform: "scale(1)", opacity: 1 },
              },
              slide: {
                "0%": { transform: "translateY(8px)", opacity: 0 },
                "100%": { transform: "translateY(0)", opacity: 1 },
              },
              confetti: {
                "0%": { transform: "translateY(-20px) rotate(0)", opacity: 1 },
                "100%": { transform: "translateY(420px) rotate(540deg)", opacity: 0 },
              },
              twinkle: {
                "0%,100%": { opacity: 0.3, transform: "scale(0.85)" },
                "50%": { opacity: 1, transform: "scale(1.1)" },
              },
            },
            animation: {
              shimmer: "shimmer 2.4s linear infinite",
              float: "float 3.6s ease-in-out infinite",
              pop: "pop 420ms cubic-bezier(.2,.9,.3,1.2) both",
              slide: "slide 320ms cubic-bezier(.2,.7,.2,1) both",
              twinkle: "twinkle 2.4s ease-in-out infinite",
            },
          },
        },
      };
    </script>
    <style>
      :root { color-scheme: dark; }
      html, body {
        background: #121212;
        font-family: "Noto Sans", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        color: #F4F0FB;
      }

      /* Subtle dot-grid texture on the canvas (Dribbble fintech pattern) */
      .phone {
        background-image:
          radial-gradient(circle at 1px 1px, rgba(244,204,96,0.025) 1px, transparent 0);
        background-size: 18px 18px;
      }

      /* Volumetric gold glow rising from beneath the hero banner */
      .glow-plume {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: -60%;
        width: 120%;
        height: 180%;
        pointer-events: none;
        background: radial-gradient(closest-side at 50% 100%,
          rgba(244,204,96,0.28) 0%,
          rgba(244,204,96,0.08) 35%,
          transparent 70%);
        filter: blur(2px);
        z-index: 0;
      }

      /* Vertical light shaft for granted page (Dribbble FinEase / Saas Hero pattern) */
      .light-shaft {
        position: absolute;
        left: 50%;
        top: -10%;
        transform: translateX(-50%);
        width: 6px;
        height: 70%;
        pointer-events: none;
        background: linear-gradient(180deg,
          rgba(244,204,96,0) 0%,
          rgba(244,204,96,0.55) 30%,
          rgba(244,204,96,0.35) 60%,
          rgba(244,204,96,0) 100%);
        filter: blur(8px);
        opacity: 0.7;
      }
      .light-shaft::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg,
          rgba(255,246,212,0) 0%,
          rgba(255,246,212,0.85) 35%,
          rgba(255,246,212,0.5) 60%,
          rgba(255,246,212,0) 100%);
        filter: blur(0.5px);
        width: 1.5px;
        left: 50%;
        transform: translateX(-50%);
      }

      /* Inner-edge sheen on premium cards — catches light at the top edge */
      .inner-rim {
        position: relative;
      }
      .inner-rim::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background: linear-gradient(180deg,
          rgba(244,204,96,0.18) 0%,
          rgba(244,204,96,0) 18%,
          transparent 100%);
        mix-blend-mode: screen;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Full-bleed canvas — no phone frame, no notch */
      .phone {
        width: min(100vw, 460px);
        min-height: 100dvh;
        background: #121212;
        overflow-x: hidden;
        position: relative;
      }
      @media (max-width: 480px) {
        .phone { width: 100vw; }
      }

      .fill {
        background: linear-gradient(90deg, #5B2EAA 0%, #9B6FE3 55%, #F4CC60 100%);
      }

      /* Hero/wish royal-purple banner with sunburst rays */
      .hero-emerald {
        background:
          radial-gradient(120% 70% at 0% 0%, rgba(255,255,255,0.06), transparent 60%),
          radial-gradient(closest-side at 100% 50%, rgba(244,204,96,0.14), transparent 70%),
          radial-gradient(closest-side at 100% 80%, rgba(217,140,200,0.16), transparent 70%),
          repeating-conic-gradient(from 0deg at 8% 100%,
            rgba(255,255,255,0.025) 0deg 4deg,
            transparent 4deg 14deg),
          linear-gradient(135deg, #5B2EAA 0%, #3D1A78 60%, #2C0F5C 100%);
      }

      .gold-text {
        background: linear-gradient(180deg, #FBE38C 0%, #F4CC60 45%, #C9A24E 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        text-shadow: 0 1px 0 rgba(0,0,0,0.4);
      }

      .wish-italic {
        font-family: "Fraunces", Georgia, serif;
        font-style: italic; font-weight: 900; letter-spacing: -0.01em;
      }

      .display-italic {
        font-family: "Playfair Display", Georgia, serif;
        font-style: italic; font-weight: 800; letter-spacing: -0.005em;
      }
      .display {
        font-family: "Playfair Display", Georgia, serif;
        font-weight: 800; letter-spacing: -0.005em;
      }

      /* Focus-visible rings for tab nav */
      button:focus-visible, [role="button"]:focus-visible, input:focus-visible {
        outline: 2px solid #F4CC60;
        outline-offset: 2px;
      }
      .card-surface:focus-visible {
        outline: 2px solid #F4CC60;
        outline-offset: 3px;
      }

      .ink-underline {
        background-image: linear-gradient(transparent 62%, rgba(244,204,96,0.95) 62%);
        background-repeat: no-repeat; background-size: 100% 100%; padding: 0 2px;
      }

      .brand-glow::before {
        content: ""; position: absolute; inset: -20% -20% auto auto;
        width: 280px; height: 280px;
        background: radial-gradient(closest-side, rgba(244,204,96,0.28), transparent 72%);
        pointer-events: none; filter: blur(2px);
      }

      .sticker {
        background: #2C0F5C; color: #F4CC60; border-radius: 999px;
        padding: 4px 10px; font-weight: 800; letter-spacing: 0.06em;
        font-size: 10px; text-transform: uppercase;
      }

      .sparkle-deco { position: absolute; pointer-events: none; }

      .chip-shimmer {
        background-image: linear-gradient(90deg,
          rgba(255,255,255,0) 0%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0) 100%);
        background-size: 400px 100%;
      }

      .confetti-piece {
        position: absolute; top: -20px; width: 10px; height: 14px; border-radius: 2px;
        animation: confetti 1600ms ease-in forwards;
      }

      .dock {
        background: rgba(18,18,18,0.86);
        backdrop-filter: saturate(180%) blur(18px);
        -webkit-backdrop-filter: saturate(180%) blur(18px);
        border-top: 1px solid #2A2A2A;
      }

      /* Surface card with subtle inner highlight */
      .card-surface {
        background: linear-gradient(180deg, #1F1F1F 0%, #161616 100%);
        border: 1px solid #2A2A2A;
      }

      .input-dark {
        background: #1A1A1A;
        border: 1px solid #2A2A2A;
      }
      .input-dark:focus-within { border-color: #F4CC60; }
    </style>
  </head>
  <body class="min-h-dvh w-full">
    <div id="root" class="min-h-dvh w-full"></div>

    <script type="text/babel" data-presets="env,react">
      const { useState, useMemo, useEffect } = React;

      /* ---------- DATA ---------- */
      // Each product = ONE task. Tapping it redirects to that product's
      // existing in-app flow (which we do NOT build here).
      const PRODUCTS = [
        {
          id: "card",
          name: "Apply for Card",
          short: "Credit Card",
          tagline: "Apply for the SalarySe Card",
          chance: "high",
          chanceLabel: "Higher chance",
          icon: "card",
          journeyTitle: "Card application",
          imgWebp: "task_card.webp",
          imgJpg: "task_card.jpg",
          supportsInProgress: true,
        },
        {
          id: "upscore",
          name: "Build UPscore",
          short: "UPscore",
          tagline: "Track your money habits",
          chance: "mid",
          chanceLabel: "Mid chance",
          icon: "spark",
          journeyTitle: "UPscore set-up",
          imgWebp: "task_upscore.webp",
          imgJpg: "task_upscore.jpg",
          supportsInProgress: false,
        },
        {
          id: "refer",
          name: "Refer a friend",
          short: "Refer & Earn",
          tagline: "Invite a friend to SalarySe",
          chance: "mid",
          chanceLabel: "Mid chance",
          icon: "gift",
          journeyTitle: "Refer & Earn",
          imgWebp: "task_refer.webp",
          imgJpg: "task_refer.jpg",
          supportsInProgress: true,
        },
      ];

      // State semantics:
      //   idle        — not started
      //   in-progress — Card / Refer only (waiting on next event)
      //   success     — wish-eligible
      //   failed      — retry possible
      const STATE_META = {
        "in-progress": {
          label: "In progress",
          icon: "flame",
          fg: "#F4C674",
          bg: "rgba(244,198,116,0.12)",
          border: "rgba(244,198,116,0.4)",
        },
        success: {
          label: "Granted",
          icon: "check",
          fg: "#7CE3A8",
          bg: "rgba(124,227,168,0.12)",
          border: "rgba(124,227,168,0.4)",
        },
        failed: {
          label: "Failed — retry",
          icon: "back",
          fg: "#F49191",
          bg: "rgba(244,145,145,0.1)",
          border: "rgba(244,145,145,0.4)",
        },
      };

      const WISH_PRESETS = ["A new iPhone", "Solo trip to Goa", "MacBook Air", "Save ₹50,000"];

      /* ---------- ICONS ---------- */
      const Icon = ({ name, className = "w-6 h-6", stroke = "currentColor", style }) => {
        const props = {
          className, style, viewBox: "0 0 24 24", fill: "none", stroke,
          strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round",
        };
        switch (name) {
          case "card":
            return (
              <svg {...props}>
                <rect x="2.5" y="5.5" width="19" height="13" rx="3" />
                <path d="M2.5 10h19" />
                <path d="M6 15h4" />
              </svg>
            );
          case "spark":
            return (
              <svg {...props}>
                <path d="M12 3v4M12 17v4M3 12h4M17 12h4" />
                <path d="M6.4 6.4l2.8 2.8M14.8 14.8l2.8 2.8M6.4 17.6l2.8-2.8M14.8 9.2l2.8-2.8" />
              </svg>
            );
          case "gift":
            return (
              <svg {...props}>
                <rect x="3" y="9" width="18" height="11" rx="2" />
                <path d="M3 13h18M12 9v11" />
                <path d="M8 9c0-2 1.5-3 3-3 1.5 0 1.5 3 1.5 3M16 9c0-2-1.5-3-3-3-1.5 0-1.5 3-1.5 3" />
              </svg>
            );
          case "back": return <svg {...props}><path d="M15 6l-6 6 6 6" /></svg>;
          case "check": return <svg {...props}><path d="M5 12.5l4.5 4.5L19 7.5" /></svg>;
          case "lock":
            return (
              <svg {...props}>
                <rect x="5" y="11" width="14" height="9" rx="2" />
                <path d="M8 11V8a4 4 0 118 0v3" />
              </svg>
            );
          case "edit":
            return (
              <svg {...props}>
                <path d="M4 20h4l10-10-4-4L4 16v4z" />
                <path d="M14 6l4 4" />
              </svg>
            );
          case "arrow": return <svg {...props}><path d="M5 12h14M13 6l6 6-6 6" /></svg>;
          case "home":
            return (
              <svg {...props}>
                <path d="M4 11l8-7 8 7v9a1 1 0 01-1 1h-4v-6h-6v6H5a1 1 0 01-1-1v-9z" />
              </svg>
            );
          case "wish":
            return (
              <svg {...props}>
                <path d="M12 21s-7-4.5-7-10a4 4 0 017-2.6A4 4 0 0119 11c0 5.5-7 10-7 10z" />
              </svg>
            );
          case "user":
            return (
              <svg {...props}>
                <circle cx="12" cy="8" r="4" />
                <path d="M4 21c1.5-4 4.5-6 8-6s6.5 2 8 6" />
              </svg>
            );
          case "sparkle":
            return (
              <svg {...props}>
                <path d="M12 2l1.6 4.4L18 8l-4.4 1.6L12 14l-1.6-4.4L6 8l4.4-1.6L12 2zM18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8L18 14z" />
              </svg>
            );
          case "info":
            return (
              <svg {...props}>
                <circle cx="12" cy="12" r="9" />
                <path d="M12 11v5" />
                <path d="M12 7.75v.5" />
              </svg>
            );
          case "star4":
            return (
              <svg {...props}>
                <path d="M12 2c0 5 1 9 10 10-9 1-10 5-10 10 0-5-1-9-10-10 9-1 10-5 10-10z" fill={stroke} stroke="none" />
              </svg>
            );
          case "flame":
            return (
              <svg {...props}>
                <path d="M12 3s4 4 4 8a4 4 0 11-8 0c0-2 1-3 1-3s-1 1.5 1 3c2 1 2-3 0-5 0-2 2-3 2-3z" />
              </svg>
            );
          case "trend":
            return (
              <svg {...props}>
                <path d="M3 17l6-6 4 4 8-8" />
                <path d="M14 7h7v7" />
              </svg>
            );
          case "lamp":
            return (
              <svg viewBox="0 0 96 72" className={className} fill="none">
                <defs>
                  <linearGradient id="lampG" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stopColor="#FBE38C" />
                    <stop offset=".45" stopColor="#F4CC60" />
                    <stop offset="1" stopColor="#A87925" />
                  </linearGradient>
                  <linearGradient id="lampShade" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0" stopColor="#A87925" stopOpacity="0.9" />
                    <stop offset=".5" stopColor="#F4CC60" />
                    <stop offset="1" stopColor="#A87925" stopOpacity="0.9" />
                  </linearGradient>
                  <radialGradient id="lampHi" cx=".4" cy=".35" r=".6">
                    <stop offset="0" stopColor="#FFF6D4" stopOpacity="0.7" />
                    <stop offset="1" stopColor="#FFF6D4" stopOpacity="0" />
                  </radialGradient>
                </defs>
                {/* base/rock under lamp */}
                <ellipse cx="48" cy="66" rx="38" ry="4" fill="#1F0F44" />
                {/* lamp body */}
                <path
                  d="M16 50 C16 38 28 30 48 30 C66 30 84 36 84 48 C84 58 70 64 48 64 C26 64 16 58 16 50 Z"
                  fill="url(#lampG)"
                />
                {/* belly highlight */}
                <ellipse cx="36" cy="42" rx="18" ry="6" fill="url(#lampHi)" />
                {/* decorative band */}
                <path
                  d="M16 48 C28 52 68 52 84 48"
                  stroke="#7C4A0E"
                  strokeWidth="2.5"
                  strokeLinecap="round"
                  fill="none"
                  opacity="0.6"
                />
                {/* spout (right side, pointing up-right) */}
                <path
                  d="M76 36 C 92 30 96 18 92 8"
                  stroke="url(#lampShade)"
                  strokeWidth="6"
                  strokeLinecap="round"
                  fill="none"
                />
                {/* spout tip */}
                <circle cx="92" cy="8" r="3" fill="#FBE38C" />
                {/* handle (left side) */}
                <path
                  d="M16 44 C 4 42 4 32 12 28 C 16 26 20 28 20 32"
                  stroke="url(#lampShade)"
                  strokeWidth="5"
                  strokeLinecap="round"
                  fill="none"
                />
                {/* lid dome */}
                <path d="M40 30 C 42 22 54 22 56 30 Z" fill="url(#lampG)" />
                {/* finial */}
                <circle cx="48" cy="20" r="3" fill="#FBE38C" />
                <rect x="46" y="14" width="4" height="6" rx="1.5" fill="#F4CC60" />
              </svg>
            );
          default: return null;
        }
      };

      /* ---------- HELPERS ---------- */
      const cls = (...a) => a.filter(Boolean).join(" ");

      function WishLockup({ size = "md", color = "light" }) {
        const isLight = color === "light";
        const sizes = {
          sm: { make: "text-[11px]", wish: "text-[28px]" },
          md: { make: "text-[13px]", wish: "text-[40px]" },
          lg: { make: "text-[15px]", wish: "text-[64px]" },
        }[size];
        return (
          <div className="inline-flex flex-col leading-none">
            <span
              className={cls(sizes.make, "italic font-medium tracking-wide",
                isLight ? "text-white/85" : "text-ink-soft")}
              style={{ fontFamily: "Fraunces, serif" }}
            >make a</span>
            <span className={cls("wish-italic gold-text mt-0.5", sizes.wish)}>WISH</span>
          </div>
        );
      }

      function StateBadge({ state, className = "" }) {
        if (!state || state === "idle") return null;
        const m = STATE_META[state];
        if (!m) return null;
        return (
          <span
            className={cls(
              "inline-flex items-center gap-1 rounded-full font-extrabold text-[10px] uppercase tracking-[0.08em] px-2 py-1 border",
              className
            )}
            style={{ background: m.bg, color: m.fg, borderColor: m.border }}
          >
            <span
              className={cls("h-1.5 w-1.5 rounded-full", state === "in-progress" && "animate-pulse")}
              style={{ background: m.fg }}
            />
            {m.label}
          </span>
        );
      }

      function ChanceChip({ level, label, className = "" }) {
        const isHigh = level === "high";
        return (
          <span
            className={cls(
              "inline-flex items-center gap-1 rounded-full font-extrabold text-[10px] uppercase tracking-[0.08em] px-2 py-1",
              isHigh
                ? "bg-hl text-brand-darker shadow-gold"
                : "bg-hl-soft text-hl border border-hl/30",
              className
            )}
          >
            <Icon
              name={isHigh ? "flame" : "trend"}
              className="w-3 h-3"
              stroke={isHigh ? "#2C0F5C" : "#F4CC60"}
            />
            {label}
          </span>
        );
      }

      function Confetti({ run }) {
        if (!run) return null;
        const pieces = Array.from({ length: 28 });
        const colors = ["#F4CC60", "#FBE38C", "#9B6FE3", "#C9A24E", "#7849C9"];
        return (
          <div className="absolute inset-0 pointer-events-none overflow-hidden z-40">
            {pieces.map((_, i) => (
              <span key={i} className="confetti-piece"
                style={{
                  left: `${Math.random() * 100}%`,
                  background: colors[i % colors.length],
                  animationDelay: `${Math.random() * 600}ms`,
                  animationDuration: `${1200 + Math.random() * 1200}ms`,
                  transform: `rotate(${Math.random() * 360}deg)`,
                }} />
            ))}
          </div>
        );
      }

      /* ---------- CHROME ---------- */
      function StatusBar() {
        return (
          <div className="relative h-12 flex items-end justify-between px-7 pb-1.5 text-[13px] font-semibold text-ink select-none">
            <span>9:41</span>
            <span className="flex items-center gap-1.5">

      /* ---------- UNLOCK TASKS (Screen 2) ---------- */
      function UnlockTasksScreen({ wish, completedSet, taskStates, onBack, onPickTask, wishHistory = [] }) {
        // Carousel data: first card = current/active wish, then past wishes (newest first)
        const carousel = useMemo(() => {
          const items = [{ kind: "active", wish, productId: null, ts: Date.now() }];
          for (const h of wishHistory) {
            items.push({ kind: "past", wish: h.wish, productId: h.productId, ts: h.ts });
          }
          return items;
        }, [wish, wishHistory]);

        return (
          <div className="relative min-h-dvh flex flex-col bg-bg animate-slide">

            <div className="flex-1 flex flex-col pb-8 no-scrollbar">

              <WishCarousel items={carousel} />

              <div className="px-5 mt-6 flex-1 flex flex-col">
                {/* Section header — directional, action-oriented */}

                  <h2 className="text-[22px] font-black tracking-tight text-ink leading-[1.18]">

                <div className="space-y-4">
                  {PRODUCTS.map((p) => (
                    <TaskChoiceCard
                      key={p.id}
                      p={p}
                      state={taskStates[p.id]}
                      completed={completedSet.has(p.id)}

          </div>

      /* ---------- WISH CAROUSEL (active + past wishes) ---------- */
      function WishCarousel({ items }) {
        const total = items.length;
        const single = total === 1;
        const [active, setActive] = useState(0);
        const trackRef = React.useRef(null);

        const onScroll = () => {
          const el = trackRef.current;
          if (!el) return;
          const cardWidth = el.firstChild?.offsetWidth || 1;
          const gap = 12; // px gap-3
          const i = Math.round(el.scrollLeft / (cardWidth + gap));
          setActive(Math.max(0, Math.min(items.length - 1, i)));
        };

        return (
          <div className="relative">
            <div
              ref={single ? null : trackRef}
              onScroll={single ? undefined : onScroll}
              className={cls(
                // py-3 gives the gold glow vertical room before the overflow-x clip kicks in
                "flex gap-3 px-5 py-3",
                single ? "" : "overflow-x-auto no-scrollbar snap-x snap-mandatory"
              )}
            >
              {items.map((it, i) => {
                const product = it.productId ? PRODUCTS.find((p) => p.id === it.productId) : null;
                const isActive = it.kind === "active";
                return (
                  <div
                    key={i}
                    className={cls(
                      "hero-emerald text-white brand-glow overflow-hidden relative shadow-card rounded-[26px] inner-rim p-5",
                      single ? "w-full" : "snap-center shrink-0 w-[88%]",
                      isActive ? "border border-hl/55 shadow-gold" : "border border-hl/15"
                    )}
                  >
                    <Icon name="star4" className="sparkle-deco w-3 h-3 animate-twinkle" stroke="#F4CC60"
                      style={{ top: 14, right: 22, animationDelay: `${i * 200}ms` }} />
                    <Icon name="star4" className="sparkle-deco w-2.5 h-2.5 animate-twinkle" stroke="#FBE38C"
                      style={{ bottom: 22, right: 60, animationDelay: `${i * 200 + 400}ms` }} />

                    {/* Padlock — vertically centered on fresh wishes for balance */}
                    {isActive && (
                      <div className="absolute top-1/2 -translate-y-1/2 right-5 flex flex-col items-center gap-1.5">
                        <div className="h-12 w-12 rounded-2xl bg-hl text-brand-darker grid place-items-center shadow-gold">
                          <Icon name="lock" className="w-5 h-5" stroke="#2C0F5C" />
                        </div>
                        <span className="text-[9px] uppercase tracking-[0.14em] font-extrabold text-hl">LOCKED</span>
                      </div>
                    )}

                    <div className="text-[10px] uppercase tracking-[0.22em] text-hl font-bold flex items-center gap-2 pr-20">
                      <Icon name="sparkle" className="w-3.5 h-3.5" stroke="#F4CC60" />
                      {isActive ? "My wish · this round" : "Wish · accepted"}
                    </div>

                    <div className="mt-3 text-[24px] leading-[1.18] font-extrabold text-white break-words line-clamp-2 min-h-[58px] pr-20">
                      "{it.wish}"
                    </div>

                    {!isActive && (
                      <div className="mt-4 flex items-center gap-2 flex-wrap">
                        <span className="sticker !bg-hl !text-brand-darker">via {product?.short || "—"}</span>
                        <span className="text-[10px] text-white/65 font-semibold uppercase tracking-wider">accepted</span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Dot indicator */}
            {total > 1 && (
              <div className="mt-2 flex items-center justify-center gap-1.5">
                {items.map((_, i) => (
                  <span
                    key={i}
                    className={cls(
                      "h-1.5 rounded-full transition-all",
                      i === active ? "w-5 bg-hl" : "w-1.5 bg-line"
                    )}
                  />
                ))}
                <span className="ml-2 text-[10px] text-ink-mute font-semibold">
                  {active === 0 ? "current" : `wish ${active + 1}/${total}`}
                </span>
              </div>
            )}
          </div>
        );
      }

      /* Task choice card — image-led banner with state overlays */
      function TaskChoiceCard({ p, state, completed, onPick }) {
        const isLocked = state === "success";
        const isFailed = state === "failed";
        const isInProgress = state === "in-progress";

        const ringAccent =
          state === "success" ? "ring-2 ring-[rgba(124,227,168,0.5)] shadow-[0_0_24px_rgba(124,227,168,0.18)]" :
          state === "in-progress" ? "ring-2 ring-[rgba(244,198,116,0.45)] shadow-[0_0_22px_rgba(244,198,116,0.16)]" :
          state === "failed" ? "ring-2 ring-[rgba(244,145,145,0.45)]" :
          completed ? "ring-2 ring-hl/45" : "ring-1 ring-white/5";

        const ctaText =
          state === "success" ? "Wish accepted" :
          state === "in-progress" ? "Continue" :
          state === "failed" ? "Try again" :
          completed ? "Open again" : "Continue";

        const statusDetail = isInProgress
          ? (p.id === "card" ? "Application under review · ~24 hrs"
            : p.id === "refer" ? "Waiting for friend to sign up"
            : "In progress")
          : isFailed
          ? (p.id === "card" ? "KYC didn’t go through. Try again."
            : p.id === "upscore" ? "Couldn’t link your account."
            : "Friend didn’t complete sign-up.")
          : isLocked
          ? "Wish accepted via this task"
          : null;

        const showOverlayBadge = (state && state !== "idle") || completed;

        return (
          <div className="space-y-2">
            {/* Optional STATE strip above the image — pristine art stays untouched */}
            {showOverlayBadge && (
              <div className="flex items-center justify-between px-1">
                {state && state !== "idle" ? (
                  <StateBadge state={state} />
                ) : completed ? (
                  <span className="inline-flex items-center gap-1 bg-hl text-brand-darker text-[10px] uppercase font-extrabold tracking-wider px-2 py-1 rounded-full shadow-gold">
                    <Icon name="check" className="w-3 h-3" stroke="#2C0F5C" /> Done · used in last wish
                  </span>
                ) : <span />}
              </div>
            )}

            <button
              onClick={onPick}
              disabled={isLocked}
              aria-label={`${p.name} — ${ctaText}`}
              className={cls(
                "w-full text-left relative block rounded-[26px] overflow-hidden transition-all shadow-card",
                !isLocked && "active:translate-y-0.5 active:scale-[0.99] hover:brightness-[1.06] hover:shadow-[0_12px_40px_rgba(124,58,237,0.22)]",
                ringAccent
              )}
              style={{ aspectRatio: "686 / 174", background: "linear-gradient(135deg, #5B2EAA 0%, #2C0F5C 100%)" }}
            >
              <picture>
                <source srcSet={p.imgWebp} type="image/webp" />
                <source srcSet={p.imgJpg} type="image/jpeg" />
                <img
                  src={p.imgJpg}
                  alt={`${p.name} — ${p.chanceLabel}`}
                  width={686}
                  height={174}
                  decoding="async"
                  className="absolute inset-0 w-full h-full object-cover select-none"
                  draggable="false"
                />
              </picture>

              {isFailed && (
                <div className="absolute inset-0 pointer-events-none"
                  style={{ background: "rgba(244,145,145,0.06)" }} />
              )}
              {isLocked && (
                <div className="absolute inset-0 pointer-events-none"
                  style={{ background: "rgba(124,227,168,0.05)" }} />
              )}

            </button>

            {/* Status detail row — outside the image, full width */}
            {statusDetail && (
              <div
                className={cls(
                  "rounded-xl px-3 py-2 text-[11px] flex items-center gap-2 mx-1",
                  isInProgress ? "bg-[rgba(244,198,116,0.10)] border border-[rgba(244,198,116,0.30)] text-[#F4C674]" :
                  isFailed ? "bg-[rgba(244,145,145,0.08)] border border-[rgba(244,145,145,0.30)] text-[#F49191]" :
                  isLocked ? "bg-[rgba(124,227,168,0.10)] border border-[rgba(124,227,168,0.30)] text-[#7CE3A8]" :
                  ""
                )}
              >
                {isInProgress && (
                  <span className="h-1.5 w-1.5 rounded-full bg-[#F4C674] animate-pulse shrink-0" />
                )}
                {isLocked && (
                  <Icon name="check" className="w-3.5 h-3.5 shrink-0" stroke="#7CE3A8" />
                )}
                <span className="truncate font-semibold">{statusDetail}</span>
              </div>
            )}
            {isInProgress && (
              <p className="text-[10px] text-ink-mute italic mx-1 mt-1" style={{ fontFamily: "Fraunces, serif" }}>
                demo: tap again to simulate completion
              </p>
            )}
          </div>
        );
      }

      /* ---------- REDIRECT OVERLAY ---------- */
      function RedirectOverlay({ product, onDone }) {
        useEffect(() => {
          const t = setTimeout(onDone, 1600);
          return () => clearTimeout(t);
        }, [onDone]);

        return (
          <div className="absolute inset-0 z-50 bg-bg/95 backdrop-blur-sm grid place-items-center px-8 animate-slide">
            <div className="text-center max-w-[280px]">
              <div className="relative mx-auto h-20 w-20 rounded-3xl bg-hl text-brand-darker grid place-items-center shadow-gold animate-pop">
                <Icon name={product.icon} className="w-9 h-9" />
                <span className="absolute -bottom-2 left-1/2 -translate-x-1/2 h-7 w-7 rounded-full bg-brand border-2 border-bg grid place-items-center">
                  <Icon name="arrow" className="w-3.5 h-3.5" stroke="#F4CC60" />
                </span>
              </div>
              <div className="mt-6 text-[11px] uppercase tracking-[0.2em] font-bold text-hl">Redirecting</div>
              <h3 className="mt-1 text-[20px] font-black text-ink leading-tight">
                Continuing to {product.short}…
              </h3>
              <p className="mt-3 text-[13px] text-ink-soft">
                You'll finish the existing {product.short.toLowerCase()} flow. We'll bring you back to your wish.
              </p>
              <div className="mt-5 h-1 rounded-full bg-line overflow-hidden">
                <div className="h-full fill animate-shimmer" style={{ width: "100%" }} />
              </div>
            </div>
          </div>
        );
      }

      /* ---------- WISH ACCEPTED — typography-led wow moment ---------- */
      function UnlockScreen({ wish, product, onAnother, onHome }) {
        const [run, setRun] = useState(true);
        const [rulesOpen, setRulesOpen] = useState(false);
        useEffect(() => { const t = setTimeout(() => setRun(false), 2800); return () => clearTimeout(t); }, []);

        // Dense magical sparkle field
        const sparkles = useMemo(
          () => Array.from({ length: 38 }).map((_, i) => ({
            top: Math.random() * 95,
            left: Math.random() * 96,
            size: 2 + Math.random() * 14,
            delay: Math.random() * 2400,
            color: i % 5 === 0 ? "#FFFFFF" : i % 3 === 0 ? "#FBE38C" : "#F4CC60",
            kind: i % 7 === 0 ? "sparkle" : "star4",
          })),
          []
        );

        const chanceText = product.chance === "high" ? "Higher — top of the queue" : "Mid — solid odds";

        return (
          <div className="relative min-h-dvh flex flex-col bg-bg animate-slide overflow-hidden">
            {/* Magical atmospheric backdrop — multi-layer aura */}
            <div
              className="absolute inset-0 pointer-events-none"
              style={{
                background:
                  "radial-gradient(closest-side at 50% 22%, rgba(244,204,96,0.34), transparent 55%)," +
                  "radial-gradient(closest-side at 50% 28%, rgba(255,246,212,0.10), transparent 30%)," +
                  "radial-gradient(closest-side at 88% 50%, rgba(155,111,227,0.42), transparent 60%)," +
                  "radial-gradient(closest-side at 12% 70%, rgba(120,73,201,0.42), transparent 60%)",
              }}
            />

            {/* Twin vertical light shafts flanking the wish */}
            <div className="absolute inset-0 pointer-events-none">
              <div
                className="absolute top-[18%] w-[3px] h-[55%]"
                style={{
                  left: "26%",
                  background: "linear-gradient(180deg, transparent 0%, rgba(244,204,96,0.35) 30%, rgba(244,204,96,0.18) 70%, transparent 100%)",
                  filter: "blur(6px)",
                }}
              />
              <div
                className="absolute top-[18%] w-[3px] h-[55%]"
                style={{
                  right: "26%",
                  background: "linear-gradient(180deg, transparent 0%, rgba(244,204,96,0.35) 30%, rgba(244,204,96,0.18) 70%, transparent 100%)",
                  filter: "blur(6px)",
                }}
              />
            </div>

            {/* Sparkle field */}
            <div className="absolute inset-0 pointer-events-none">
              {sparkles.map((s, i) => (
                <Icon
                  key={i} name={s.kind}
                  className="sparkle-deco animate-twinkle"
                  stroke={s.color}
                  style={{
                    top: `${s.top}%`, left: `${s.left}%`,
                    width: s.size, height: s.size,
                    animationDelay: `${s.delay}ms`,
                  }}
                />
              ))}
            </div>

            <TopBar title="" />
            <Confetti run={run} />

            <div className="relative flex-1 px-6 pb-8 flex flex-col items-center text-center">
              {/* WISH RECEIVED pill — explicitly NOT "granted" */}
              <div className="mt-1 animate-pop">
                <div className="inline-flex items-center gap-2 bg-hl text-brand-darker rounded-full px-4 py-2 shadow-gold">
                  <Icon name="sparkle" className="w-4 h-4" />
                  <span className="text-[12px] font-extrabold tracking-[0.2em] uppercase">Wish received</span>
                </div>
              </div>

              {/* HERO group — wish-as-hero, minimal copy */}
              <div className="mt-auto pt-5 w-full flex flex-col items-center">
                {/* Top ornament */}
                <div className="flex items-center gap-3 w-full max-w-[240px] animate-pop" style={{ animationDelay: "120ms" }}>
                  <span className="flex-1 h-px" style={{ background: "linear-gradient(90deg, transparent, rgba(244,204,96,0.5), transparent)" }} />
                  <Icon name="sparkle" className="w-3 h-3 shrink-0" stroke="#F4CC60" />
                  <span className="flex-1 h-px" style={{ background: "linear-gradient(90deg, transparent, rgba(244,204,96,0.5), transparent)" }} />
                </div>

                {/* THE WISH — biggest typographic moment */}
                <h1
                  className="mt-5 text-[40px] leading-[1.06] tracking-[-0.012em] display-italic px-1 break-words animate-pop"
                  style={{
                    animationDelay: "180ms",
                    color: "#FFFFFF",
                    textShadow: "0 0 32px rgba(244,204,96,0.6), 0 0 64px rgba(244,204,96,0.26)",
                  }}
                >
                  &ldquo;{wish}&rdquo;
                </h1>

                {/* Bottom ornament */}
                <div className="mt-5 flex items-center gap-3 w-full max-w-[240px] animate-pop" style={{ animationDelay: "240ms" }}>
                  <span className="flex-1 h-px" style={{ background: "linear-gradient(90deg, transparent, rgba(244,204,96,0.5), transparent)" }} />
                  <Icon name="sparkle" className="w-3 h-3 shrink-0" stroke="#F4CC60" />
                  <span className="flex-1 h-px" style={{ background: "linear-gradient(90deg, transparent, rgba(244,204,96,0.5), transparent)" }} />
                </div>

                {/* Credit block — concise */}
                <div className="mt-7 flex flex-col items-center animate-pop" style={{ animationDelay: "320ms" }}>
                  <div className="text-[10px] uppercase tracking-[0.42em] font-bold text-hl">
                    entered via
                  </div>
                  <div
                    className="mt-2 text-[22px] leading-[1.15] tracking-[-0.005em] font-extrabold text-ink"
                    style={{ textShadow: "0 0 16px rgba(255,255,255,0.18)" }}
                  >
                    {product.journeyTitle}
                  </div>
                  <p
                    className="mt-1.5 text-[15px] leading-[1.3]"
                    style={{
                      fontFamily: "Fraunces, serif",
                      fontStyle: "italic",
                      fontWeight: 500,
                      color: "#F4CC60",
                    }}
                  >
                    {product.chance === "high" ? "Higher odds" : "Mid odds"}
                  </p>
                </div>

                {/* Reassurance — concise, no countdown */}
                <p
                  className="mt-6 text-center text-[12.5px] text-ink-soft leading-snug max-w-[280px] animate-pop"
                  style={{ animationDelay: "420ms" }}
                >
                  You’re in the draw.{" "}
                  <span className="text-hl font-semibold">Keep an eye on your app</span> for results.
                </p>
              </div>

              {/* CTAs — pinned to bottom */}
              <div className="mt-auto pt-8 w-full space-y-2">
                <button
                  onClick={onAnother}
                  className="w-full h-[58px] rounded-2xl bg-hl text-brand-darker font-extrabold text-[16px] shadow-gold active:translate-y-0.5 active:scale-[0.99] hover:brightness-110 transition flex items-center justify-center gap-2"
                  style={{ boxShadow: "0 0 0 1px rgba(255,246,212,0.4) inset, 0 8px 28px rgba(244,204,96,0.32)" }}
                >
                  Make another <span className="display-italic text-brand-darker text-[20px]">wish</span>
                  <Icon name="sparkle" className="w-5 h-5" />
                </button>
                <button
                  onClick={onHome}
                  className="w-full h-12 rounded-2xl text-ink-soft font-bold text-[14px] hover:text-hl active:translate-y-0.5 transition"
                >Back to home</button>
                <button
                  type="button"
                  onClick={() => setRulesOpen(true)}
                  className="mt-1 w-full text-center text-[11px] text-ink-mute hover:text-hl underline underline-offset-2 decoration-ink-mute/40 hover:decoration-hl/60 transition"
                >
                  How the draw works · Terms &amp; conditions
                </button>
              </div>
            </div>

            <DrawRulesSheet open={rulesOpen} onClose={() => setRulesOpen(false)} />
          </div>
        );
      }

      /* ---------- APP ---------- */
      function App() {
        // routes: entry → unlock → granted
        const [route, setRoute] = useState("entry");
        const [wish, setWish] = useState("");
        const [taskStates, setTaskStates] = useState({ card: "idle", upscore: "idle", refer: "idle" });
        const [historicallyUsed, setHistoricallyUsed] = useState(new Set());
        const [totalUnlocked, setTotalUnlocked] = useState(0);
        const [redirectingProductId, setRedirectingProductId] = useState(null);
        const [grantedProductId, setGrantedProductId] = useState(null);
        // Past wishes carousel: list of { wish, productId, ts }
        const [wishHistory, setWishHistory] = useState([]);

        const grantedProduct = useMemo(
          () => grantedProductId ? PRODUCTS.find((p) => p.id === grantedProductId) : null,
          [grantedProductId]
        );
        const redirectingProduct = useMemo(
          () => redirectingProductId ? PRODUCTS.find((p) => p.id === redirectingProductId) : null,
          [redirectingProductId]
        );

        function handleEntryConfirm(text) {
          setWish(text);
          setRoute("unlock");
        }

        function handleEditWish(newText) {
          if (!newText.trim() || newText === wish) return;
          setWish(newText);
        }

        // Tapping a task triggers a redirect simulation. After it returns,
        // we transition the product's state. Card / Refer go through
        // in-progress first; UPscore is binary (success / failed).
        function handlePickTask(productId) {
          setRedirectingProductId(productId);
        }

        function handleRedirectDone() {
          const id = redirectingProductId;
          if (!id) return;
          const product = PRODUCTS.find((p) => p.id === id);
          const current = taskStates[id];

          let next;
          if (product.supportsInProgress) {
            // Card / Refer:
            //   idle → in-progress
            //   in-progress / failed → success (this demo grants on second tap)
            if (current === "idle") next = "in-progress";
            else next = "success";
          } else {
            // UPscore:
            //   idle / failed → success directly (no in-progress)
            next = "success";
          }

          setTaskStates((prev) => ({ ...prev, [id]: next }));
          setRedirectingProductId(null);

          if (next === "success") {
            setHistoricallyUsed((prev) => new Set([...prev, id]));
            setTotalUnlocked((c) => c + 1);
            setGrantedProductId(id);
            setWishHistory((prev) => [{ wish, productId: id, ts: Date.now() }, ...prev]);
            // Briefly let the success state render on the list before celebrating
            setTimeout(() => setRoute("granted"), 380);
          }
        }

        function handleAnother() {
          // New wish: reset states & wish; preserve historicallyUsed
          setWish("");
          setTaskStates({ card: "idle", upscore: "idle", refer: "idle" });
          setGrantedProductId(null);
          setRoute("entry");
        }

        return (
          <div className="w-full min-h-dvh flex justify-center" style={{ background: "#0A0A0A" }}>
            <div className="phone">

              {route === "entry" && (
                <WishEntryScreen
                  onConfirm={handleEntryConfirm}
                  totalUnlocked={totalUnlocked}
                  wishHistory={wishHistory}
                />
              )}

              {route === "unlock" && (
                <UnlockTasksScreen
                  wish={wish}
                  taskStates={taskStates}
                  completedSet={historicallyUsed}
                  wishHistory={wishHistory}
                  onBack={() => setRoute("entry")}
                  onPickTask={handlePickTask}
                />
              )}

              {route === "granted" && grantedProduct && (
                <UnlockScreen
                  wish={wish}
                  product={grantedProduct}
                  onAnother={handleAnother}
                  onHome={handleAnother}
                />
              )}

              {/* Redirect overlay sits above any screen */}
              {redirectingProduct && (
                <RedirectOverlay
                  product={redirectingProduct}
                  onDone={handleRedirectDone}
                />
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
